<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>每日熱量 · 體重管理</title>
<style>
  :root{
    --bg:#10221c;
    --surface:#16302770;
    --surface-solid:#173228;
    --line:#27483c;
    --leaf:#7fd1a8;
    --leaf-dim:#4f8c70;
    --sand:#e9e3d3;
    --warm:#e8b07a;
    --alert:#e08a7a;
    --txt:#eef3ee;
    --txt-dim:#9bb5a7;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg);color:var(--txt);}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
    max-width:480px;margin:0 auto;min-height:100vh;
    padding:0 18px calc(96px + env(safe-area-inset-bottom));
    background:
      radial-gradient(120% 60% at 50% -10%, #1c4031 0%, transparent 60%),
      var(--bg);
  }
  h1,h2,h3{font-weight:600;letter-spacing:-0.01em;}
  .eyebrow{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--leaf-dim);font-weight:600;}
  header{padding:22px 2px 12px;}
  header .date{font-size:13px;color:var(--txt-dim);margin-top:4px;}
  header h1{font-size:21px;margin-top:2px;}

  /* ring */
  .ring-card{
    background:var(--surface);border:1px solid var(--line);border-radius:24px;
    padding:24px;display:flex;align-items:center;gap:20px;backdrop-filter:blur(8px);
    margin-top:6px;
  }
  .ring-wrap{position:relative;width:128px;height:128px;flex-shrink:0;}
  .ring-wrap svg{transform:rotate(-90deg);}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .ring-center .num{font-size:30px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;}
  .ring-center .lbl{font-size:10px;color:var(--txt-dim);margin-top:4px;letter-spacing:0.1em;}
  .ring-info{flex:1;}
  .ring-info .row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px dashed var(--line);}
  .ring-info .row:last-child{border-bottom:none;}
  .ring-info .k{font-size:13px;color:var(--txt-dim);}
  .ring-info .v{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;}
  .v.over{color:var(--warm);}

  /* macros */
  .macros{display:flex;gap:10px;margin-top:12px;}
  .macro{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:12px 10px;}
  .macro .name{font-size:11px;color:var(--txt-dim);}
  .macro .amt{font-size:17px;font-weight:600;margin-top:3px;font-variant-numeric:tabular-nums;}
  .macro .amt span{font-size:11px;color:var(--txt-dim);font-weight:400;}
  .macro .bar{height:4px;border-radius:2px;background:var(--line);margin-top:8px;overflow:hidden;}
  .macro .bar i{display:block;height:100%;border-radius:2px;}

  section{margin-top:26px;}
  .sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .sec-head h2{font-size:16px;}

  /* log entries */
  .entry{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--line);}
  .entry:last-child{border-bottom:none;}
  .entry .e-name{flex:1;font-size:15px;}
  .entry .e-sub{font-size:12px;color:var(--txt-dim);margin-top:2px;}
  .entry .e-cal{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;}
  .entry .e-del{background:none;border:none;color:var(--txt-dim);font-size:20px;padding:0 4px;cursor:pointer;line-height:1;}
  .empty{text-align:center;padding:32px 20px;color:var(--txt-dim);font-size:14px;line-height:1.6;
    border:1px dashed var(--line);border-radius:18px;}

  /* weight chart */
  .chart-card{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:18px;}
  .chart-card svg{width:100%;height:140px;display:block;overflow:visible;}
  .chart-foot{display:flex;justify-content:space-between;margin-top:10px;font-size:12px;color:var(--txt-dim);}

  /* buttons */
  .pill{background:none;border:1px solid var(--line);color:var(--leaf);font-size:13px;
    padding:7px 14px;border-radius:999px;cursor:pointer;font-weight:500;}
  .pill:active{background:var(--surface-solid);}

  /* bottom add bar */
  .fab-bar{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;z-index:30;
    padding:14px 18px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(to top,var(--bg) 70%,transparent);}
  .fab{width:100%;background:var(--leaf);color:#08231a;border:none;border-radius:16px;
    padding:16px;font-size:16px;font-weight:700;cursor:pointer;}
  .fab:active{transform:scale(0.985);}

  /* sheet / modal */
  .scrim{position:fixed;inset:0;background:#000a06aa;opacity:0;pointer-events:none;
    transition:opacity .25s;z-index:40;backdrop-filter:blur(2px);}
  .scrim.on{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;z-index:50;
    background:var(--surface-solid);border:1px solid var(--line);border-bottom:none;
    border-radius:26px 26px 0 0;padding:8px 22px calc(26px + env(safe-area-inset-bottom));
    transform:translateY(110%);transition:transform .3s cubic-bezier(.3,.9,.3,1);
    max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .sheet.on{transform:translateY(0);}
  .grab{width:40px;height:4px;border-radius:2px;background:var(--line);margin:8px auto 18px;}
  .sheet h3{font-size:18px;margin-bottom:18px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12px;color:var(--txt-dim);margin-bottom:7px;letter-spacing:0.04em;}
  .field input,.field select{width:100%;background:var(--bg);border:1px solid var(--line);
    color:var(--txt);font-size:16px;padding:14px;border-radius:13px;font-family:inherit;}
  .field input:focus,.field select:focus{outline:none;border-color:var(--leaf-dim);}
  .two{display:flex;gap:12px;}
  .two .field{flex:1;}
  .sheet .fab{margin-top:6px;}

  .note{font-size:12px;color:var(--txt-dim);line-height:1.6;margin-top:14px;
    padding:12px 14px;background:var(--surface);border-radius:13px;border:1px solid var(--line);}
  .note b{color:var(--leaf);font-weight:600;}

  .seg{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:13px;padding:3px;}
  .seg button{flex:1;background:none;border:none;color:var(--txt-dim);padding:10px;
    border-radius:10px;font-size:13px;cursor:pointer;font-family:inherit;}
  .seg button.on{background:var(--surface-solid);color:var(--txt);font-weight:600;}

  /* camera */
  .cam-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
    background:var(--surface);border:1px dashed var(--leaf-dim);color:var(--leaf);
    padding:16px;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;
    font-family:inherit;margin-bottom:18px;}
  .cam-btn:active{background:var(--surface-solid);}
  .cam-ico{font-size:20px;}
  .cam-preview{margin-bottom:18px;border-radius:14px;overflow:hidden;border:1px solid var(--line);position:relative;}
  .cam-preview img{width:100%;display:block;max-height:200px;object-fit:cover;}
  .cam-status{padding:11px 14px;font-size:13px;background:var(--surface-solid);color:var(--txt-dim);
    display:flex;align-items:center;gap:8px;}
  .cam-status.busy{color:var(--leaf);}
  .cam-status.err{color:var(--alert);}
  .cam-status.ok{color:var(--leaf);}
  .spin{width:13px;height:13px;border:2px solid var(--line);border-top-color:var(--leaf);
    border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .sheet-err{color:var(--alert);font-size:13px;margin-bottom:12px;text-align:center;}
</style>
</head>
<body>

<header>
  <div class="eyebrow">每日熱量</div>
  <h1 id="greeting">今天好好吃飯</h1>
  <div class="date" id="todayDate"></div>
</header>

<!-- calorie ring -->
<div class="ring-card">
  <div class="ring-wrap">
    <svg width="128" height="128" viewBox="0 0 128 128">
      <circle cx="64" cy="64" r="56" fill="none" stroke="var(--line)" stroke-width="11"/>
      <circle id="ringFill" cx="64" cy="64" r="56" fill="none" stroke="var(--leaf)"
        stroke-width="11" stroke-linecap="round" stroke-dasharray="351.85" stroke-dashoffset="351.85"/>
    </svg>
    <div class="ring-center">
      <div class="num" id="ringRemain">0</div>
      <div class="lbl">大卡可吃</div>
    </div>
  </div>
  <div class="ring-info">
    <div class="row"><span class="k">目標</span><span class="v" id="goalCal">—</span></div>
    <div class="row"><span class="k">已攝取</span><span class="v" id="eatenCal">0</span></div>
    <div class="row"><span class="k">運動</span><span class="v" id="exCal">0</span></div>
  </div>
</div>

<!-- macros -->
<div class="macros">
  <div class="macro">
    <div class="name">蛋白質</div>
    <div class="amt" id="pAmt">0<span> g</span></div>
    <div class="bar"><i id="pBar" style="background:var(--leaf);width:0"></i></div>
  </div>
  <div class="macro">
    <div class="name">碳水</div>
    <div class="amt" id="cAmt">0<span> g</span></div>
    <div class="bar"><i id="cBar" style="background:var(--warm);width:0"></i></div>
  </div>
  <div class="macro">
    <div class="name">脂肪</div>
    <div class="amt" id="fAmt">0<span> g</span></div>
    <div class="bar"><i id="fBar" style="background:var(--sand);width:0"></i></div>
  </div>
</div>

<!-- food log -->
<section>
  <div class="sec-head">
    <h2>今日記錄</h2>
    <button class="pill" id="exBtn">＋ 運動</button>
  </div>
  <div id="logList"></div>
</section>

<!-- weight -->
<section>
  <div class="sec-head">
    <h2>體重趨勢</h2>
    <button class="pill" id="weightBtn">＋ 記錄</button>
  </div>
  <div class="chart-card">
    <svg id="weightChart" viewBox="0 0 320 140" preserveAspectRatio="none"></svg>
    <div class="chart-foot">
      <span id="wStart">—</span>
      <span id="wTrend">開始記錄體重</span>
    </div>
  </div>
</section>

<div class="fab-bar">
  <button class="fab" id="addFoodBtn">＋ 記錄食物</button>
</div>

<!-- ===== sheets ===== -->
<div class="scrim" id="scrim"></div>

<!-- food sheet -->
<div class="sheet" id="foodSheet">
  <div class="grab"></div>
  <h3>記錄食物</h3>

  <input id="camInput" type="file" accept="image/*" hidden>
  <button class="cam-btn" id="camBtn">
    <span class="cam-ico">📷</span>
    <span class="cam-txt">拍照／選照片辨識</span>
  </button>
  <div id="camPreview" class="cam-preview" hidden>
    <img id="camImg" alt="食物照片">
    <div id="camStatus" class="cam-status"></div>
  </div>

  <div class="field">
    <label>食物名稱</label>
    <input id="fName" type="text" placeholder="例如：雞胸肉便當" autocomplete="off">
  </div>
  <div class="two">
    <div class="field"><label>熱量 (大卡)</label><input id="fCal" type="number" inputmode="numeric" placeholder="0"></div>
    <div class="field"><label>餐別</label>
      <select id="fMeal"><option>早餐</option><option>午餐</option><option>晚餐</option><option>點心</option></select>
    </div>
  </div>
  <div class="two">
    <div class="field"><label>蛋白 g</label><input id="fP" type="number" inputmode="numeric" placeholder="0"></div>
    <div class="field"><label>碳水 g</label><input id="fC" type="number" inputmode="numeric" placeholder="0"></div>
    <div class="field"><label>脂肪 g</label><input id="fF" type="number" inputmode="numeric" placeholder="0"></div>
  </div>
  <div id="fErr" class="sheet-err" hidden></div>
  <button class="fab" id="saveFood">加入記錄</button>
</div>

<!-- exercise sheet -->
<div class="sheet" id="exSheet">
  <div class="grab"></div>
  <h3>記錄運動</h3>
  <div class="field"><label>運動內容</label><input id="exName" type="text" placeholder="例如：快走 30 分鐘" autocomplete="off"></div>
  <div class="field"><label>消耗熱量 (大卡)</label><input id="exVal" type="number" inputmode="numeric" placeholder="0"></div>
  <button class="fab" id="saveEx">加入記錄</button>
</div>

<!-- weight sheet -->
<div class="sheet" id="wSheet">
  <div class="grab"></div>
  <h3>記錄體重</h3>
  <div class="field"><label>今天體重 (公斤)</label><input id="wVal" type="number" inputmode="decimal" placeholder="0.0" step="0.1"></div>
  <button class="fab" id="saveWeight">儲存</button>
</div>

<!-- setup sheet -->
<div class="sheet" id="setupSheet">
  <div class="grab"></div>
  <h3>設定你的目標</h3>
  <div class="seg" style="margin-bottom:16px">
    <button data-sex="female" class="on">女性</button>
    <button data-sex="male">男性</button>
  </div>
  <div class="two">
    <div class="field"><label>年齡</label><input id="sAge" type="number" inputmode="numeric" placeholder="35"></div>
    <div class="field"><label>身高 cm</label><input id="sHt" type="number" inputmode="numeric" placeholder="160"></div>
    <div class="field"><label>體重 kg</label><input id="sWt" type="number" inputmode="decimal" placeholder="60"></div>
  </div>
  <div class="field">
    <label>日常活動量</label>
    <select id="sAct">
      <option value="1.2">久坐（少運動）</option>
      <option value="1.375" selected>輕度（每週運動 1–3 次）</option>
      <option value="1.55">中度（每週 3–5 次）</option>
      <option value="1.725">高度（每週 6–7 次）</option>
    </select>
  </div>
  <div class="field">
    <label>減重步調</label>
    <select id="sPace">
      <option value="250">溫和 · 每週約 0.25 kg</option>
      <option value="400" selected>標準 · 每週約 0.4 kg</option>
      <option value="500">較快 · 每週約 0.5 kg</option>
    </select>
  </div>
  <button class="fab" id="saveSetup">算出我的目標</button>
  <div class="note">這個工具用 <b>溫和、可持續</b> 的方式估算熱量目標，並會幫你守住健康下限——不建議把每日攝取壓得太低，因為長期過度節食容易反彈，也可能影響健康。數字僅供參考，重要決定請諮詢醫師或營養師。</div>
</div>

<script>
const $=s=>document.querySelector(s);

// ╔══════════════════════════════════════════════════════════╗
// ║  設定：把你的 Make.com Webhook 網址貼在下面的引號中間      ║
// ║  例如 "https://hook.eu2.make.com/abc123..."               ║
// ╚══════════════════════════════════════════════════════════╝
const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/wwi6hon6clw337sq9dlmtjosdlmnx373";

const fmt=n=>Math.round(n).toLocaleString();

// ---- state (in-memory only) ----
const state={
  profile:null,        // {sex,age,ht,wt,act,pace, goalCal, floorCal}
  foods:[],            // {name,cal,meal,p,c,f}
  exercises:[],        // {name,val}
  weights:[],          // {d:Date-ish label, v:number}
};
let setupSex="female";

// ---- 自動儲存 / 讀取 ----
const STORE_KEY="calorieTracker_v1";
function todayKey(){
  const d=new Date();
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}
function save(){
  try{
    localStorage.setItem(STORE_KEY, JSON.stringify({
      profile:state.profile,
      weights:state.weights,        // 體重長期保留
      day:todayKey(),               // 當天日期
      foods:state.foods,            // 當天食物
      exercises:state.exercises     // 當天運動
    }));
  }catch(_){}
}
function load(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(!raw)return;
    const d=JSON.parse(raw);
    state.profile=d.profile||null;
    state.weights=d.weights||[];
    if(state.profile&&state.profile.sex)setupSex=state.profile.sex;
    // 食物與運動只在「同一天」才還原，跨日自動清空（新的一天重新開始）
    if(d.day===todayKey()){
      state.foods=d.foods||[];
      state.exercises=d.exercises||[];
    }
  }catch(_){}
}

// ---- date ----
$("#todayDate").textContent=new Date().toLocaleDateString("zh-TW",{month:"long",day:"numeric",weekday:"long"});
const hr=new Date().getHours();
$("#greeting").textContent = hr<11?"早安，好好吃早餐":hr<17?"午安，記得補水":"晚上好，今天辛苦了";

// ---- sheets ----
const scrim=$("#scrim");
function openSheet(id){scrim.classList.add("on");$(id).classList.add("on");}
function closeSheets(){scrim.classList.remove("on");document.querySelectorAll(".sheet").forEach(s=>s.classList.remove("on"));}
scrim.addEventListener("click",closeSheets);

$("#addFoodBtn").onclick=()=>openSheet("#foodSheet");
$("#exBtn").onclick=()=>openSheet("#exSheet");
$("#weightBtn").onclick=()=>openSheet("#wSheet");

// ---- setup / TDEE ----
document.querySelectorAll("#setupSheet .seg button").forEach(b=>{
  b.onclick=()=>{document.querySelectorAll("#setupSheet .seg button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");setupSex=b.dataset.sex;};
});
$("#saveSetup").onclick=()=>{
  const age=+$("#sAge").value,ht=+$("#sHt").value,wt=+$("#sWt").value,act=+$("#sAct").value,pace=+$("#sPace").value;
  if(!age){alert("請填入年齡");$("#sAge").focus();return;}
  if(!ht){alert("請填入身高");$("#sHt").focus();return;}
  if(!wt){alert("請填入體重");$("#sWt").focus();return;}
  // Mifflin-St Jeor
  const bmr = setupSex==="male" ? 10*wt+6.25*ht-5*age+5 : 10*wt+6.25*ht-5*age-161;
  const tdee = bmr*act;
  // healthy floor: don't recommend below ~1200(F)/1500(M)
  const floor = setupSex==="male"?1500:1200;
  let goal = Math.round((tdee - pace)/10)*10;
  if(goal<floor) goal=floor;
  state.profile={sex:setupSex,age,ht,wt,act,pace,goalCal:goal,tdee:Math.round(tdee)};
  if(state.weights.length===0) state.weights.push({d:"今天",v:wt});
  closeSheets();
  render();
};

// ---- camera recognition ----
$("#camBtn").onclick=()=>$("#camInput").click();
$("#camInput").onchange=async e=>{
  const file=e.target.files[0];
  if(!file)return;
  $("#camPreview").hidden=false;
  setStatus("busy",'<span class="spin"></span>處理照片中…');
  try{
    // 把任何格式(含 iPhone HEIC)統一轉成 JPEG，並縮小尺寸
    const {dataUrl,b64}=await toJpeg(file);
    $("#camImg").src=dataUrl;
    setStatus("busy",'<span class="spin"></span>辨識中…請稍候');
    const food=await recognizeFood(b64,"image/jpeg");
    if(!food||!food.name){throw new Error("無法辨識");}
    $("#fName").value=food.name||"";
    $("#fCal").value=food.cal||"";
    $("#fP").value=food.p||"";
    $("#fC").value=food.c||"";
    $("#fF").value=food.f||"";
    setStatus("ok","✓ 已填入估算值，可手動修改後再加入");
  }catch(err){
    if((err.message||"").includes("Webhook")){
      setStatus("err","尚未設定辨識服務，請先在 HTML 填入 Webhook 網址，或手動輸入");
    }else{
      setStatus("err","辨識失敗，請手動輸入。"+(err.message||""));
    }
  }
};

// 將圖片檔轉為 JPEG（透過 canvas 重繪），最長邊限制 1024px
async function toJpeg(file){
  // 優先用 createImageBitmap（iOS 對 HEIC 解碼較可靠）
  let bitmap;
  try{
    bitmap=await createImageBitmap(file);
  }catch(_){
    bitmap=await loadViaImgTag(file); // 備援
  }
  const max=1024;
  let w=bitmap.width,h=bitmap.height;
  if(w>max||h>max){
    if(w>=h){h=Math.round(h*max/w);w=max;}
    else{w=Math.round(w*max/h);h=max;}
  }
  const canvas=document.createElement("canvas");
  canvas.width=w;canvas.height=h;
  canvas.getContext("2d").drawImage(bitmap,0,0,w,h);
  if(bitmap.close)bitmap.close();
  const dataUrl=canvas.toDataURL("image/jpeg",0.85);
  return {dataUrl,b64:dataUrl.split(",")[1]};
}
// 備援：用 <img> 標籤載入
function loadViaImgTag(file){
  return new Promise((resolve,reject)=>{
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{URL.revokeObjectURL(url);resolve(img);};
    img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error("照片格式無法讀取"));};
    img.src=url;
  });
}
function setStatus(cls,html){
  const s=$("#camStatus");s.className="cam-status "+cls;s.innerHTML=html;
}

async function recognizeFood(b64,media){
  if(!MAKE_WEBHOOK_URL){
    throw new Error("尚未設定 Webhook 網址");
  }
  const res=await fetch(MAKE_WEBHOOK_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      image_base64:b64,
      media_type:media
    })
  });
  if(!res.ok) throw new Error("伺服器回應 "+res.status);
  const raw=await res.text();
  // Make 可能回傳純 JSON，也可能被包在文字裡，兩種都嘗試解析
  let text=raw.trim().replace(/```json|```/g,"").trim();
  let food;
  try{
    food=JSON.parse(text);
  }catch{
    const m=text.match(/\{[\s\S]*\}/);
    if(!m) throw new Error("回傳格式無法解析");
    food=JSON.parse(m[0]);
  }
  return food;
}

// ---- add food ----
$("#saveFood").onclick=()=>{
  const err=$("#fErr");
  const name=$("#fName").value.trim();
  const calRaw=$("#fCal").value.trim();
  const cal=Number(calRaw);
  if(!name){err.hidden=false;err.textContent="請填入食物名稱";$("#fName").focus();return;}
  if(calRaw===""||isNaN(cal)){err.hidden=false;err.textContent="請填入熱量數字";$("#fCal").focus();return;}
  err.hidden=true;
  state.foods.push({id:Date.now()+"_"+Math.random().toString(36).slice(2,7),name,cal,meal:$("#fMeal").value,p:+$("#fP").value||0,c:+$("#fC").value||0,f:+$("#fF").value||0});
  ["#fName","#fCal","#fP","#fC","#fF"].forEach(s=>$(s).value="");
  $("#camPreview").hidden=true;$("#camInput").value="";
  closeSheets();render();
};
// ---- add exercise ----
$("#saveEx").onclick=()=>{
  const name=$("#exName").value.trim(), val=+$("#exVal").value;
  if(!name||!val){alert("請填入運動內容與消耗熱量");return;}
  state.exercises.push({id:Date.now()+"_"+Math.random().toString(36).slice(2,7),name,val});
  $("#exName").value="";$("#exVal").value="";
  closeSheets();render();
};
// ---- add weight ----
$("#saveWeight").onclick=()=>{
  const v=+$("#wVal").value;
  if(!v){alert("請填入體重");return;}
  state.weights.push({d:new Date().toLocaleDateString("zh-TW",{month:"numeric",day:"numeric"}),v});
  $("#wVal").value="";closeSheets();render();
};

// ---- render ----
function render(){
  save();   // 每次畫面更新都自動儲存
  const eaten=state.foods.reduce((s,f)=>s+f.cal,0);
  const ex=state.exercises.reduce((s,e)=>s+e.val,0);
  const goal=state.profile?state.profile.goalCal:0;
  const remain=goal+ex-eaten;

  $("#goalCal").textContent=state.profile?fmt(goal):"設定 →";
  $("#goalCal").style.color=state.profile?"":"var(--leaf)";
  $("#eatenCal").textContent=fmt(eaten);
  $("#exCal").textContent=ex?("+"+fmt(ex)):"0";
  $("#ringRemain").textContent=fmt(remain);

  // ring
  const C=351.85;
  const pct=goal? Math.min(eaten/(goal+ex),1):0;
  $("#ringFill").style.strokeDashoffset=C*(1-pct);
  const over = goal && eaten>goal+ex;
  $("#ringFill").style.stroke = over?"var(--alert)":"var(--leaf)";
  $("#ringRemain").style.color = over?"var(--alert)":"var(--txt)";

  // macros (goal split 30P/40C/30F of goal cals -> grams)
  const P=state.foods.reduce((s,f)=>s+f.p,0),Cc=state.foods.reduce((s,f)=>s+f.c,0),F=state.foods.reduce((s,f)=>s+f.f,0);
  const gP=goal?goal*0.3/4:120, gC=goal?goal*0.4/4:180, gF=goal?goal*0.3/9:55;
  $("#pAmt").innerHTML=fmt(P)+"<span> g</span>";
  $("#cAmt").innerHTML=fmt(Cc)+"<span> g</span>";
  $("#fAmt").innerHTML=fmt(F)+"<span> g</span>";
  $("#pBar").style.width=Math.min(P/gP*100,100)+"%";
  $("#cBar").style.width=Math.min(Cc/gC*100,100)+"%";
  $("#fBar").style.width=Math.min(F/gF*100,100)+"%";

  // log list
  const all=[...state.foods.map((f,i)=>({...f,t:"food",i})),...state.exercises.map((e,i)=>({...e,t:"ex",i}))];
  const list=$("#logList");
  if(all.length===0){
    list.innerHTML='<div class="empty">還沒有記錄。<br>點下方按鈕，記下今天的第一餐吧。</div>';
  }else{
    list.innerHTML=all.map(item=>{
      const ref=item.id!=null?('data-id="'+item.id+'"'):('data-i="'+item.i+'"');
      if(item.t==="food"){
        return `<div class="entry">
          <div style="flex:1"><div class="e-name">${esc(item.name)}</div><div class="e-sub">${item.meal}</div></div>
          <div class="e-cal">${fmt(item.cal)}</div>
          <button class="e-del" data-t="food" ${ref}>×</button></div>`;
      }
      return `<div class="entry">
        <div style="flex:1"><div class="e-name">${esc(item.name)}</div><div class="e-sub">運動</div></div>
        <div class="e-cal" style="color:var(--leaf)">−${fmt(item.val)}</div>
        <button class="e-del" data-t="ex" ${ref}>×</button></div>`;
    }).join("");
    list.querySelectorAll(".e-del").forEach(b=>b.onclick=()=>{
      const arr=b.dataset.t==="food"?state.foods:state.exercises;
      if(b.dataset.id!=null&&b.dataset.id!==""){
        const idx=arr.findIndex(x=>String(x.id)===b.dataset.id);
        if(idx>-1)arr.splice(idx,1);
      }else{
        arr.splice(+b.dataset.i,1);  // 相容舊資料（無 id）
      }
      render();
    });
  }

  renderWeight();
}

function renderWeight(){
  const w=state.weights, svg=$("#weightChart");
  if(w.length<2){
    svg.innerHTML=`<text x="160" y="74" fill="var(--txt-dim)" font-size="12" text-anchor="middle">${w.length?"再記錄一次就能看到趨勢線":"記錄體重以顯示趨勢"}</text>`;
    $("#wStart").textContent=w.length?w[0].v+" kg":"—";
    $("#wTrend").textContent=w.length?"今天起步":"開始記錄體重";
    return;
  }
  const vals=w.map(x=>x.v),min=Math.min(...vals)-0.5,max=Math.max(...vals)+0.5,rng=max-min||1;
  const X=i=>20+i*(280/(w.length-1)), Y=v=>120-((v-min)/rng)*100;
  let path=w.map((p,i)=>(i?"L":"M")+X(i)+" "+Y(p.v)).join(" ");
  let area=path+` L${X(w.length-1)} 130 L20 130 Z`;
  let dots=w.map((p,i)=>`<circle cx="${X(i)}" cy="${Y(p.v)}" r="3.5" fill="var(--leaf)"/>`).join("");
  svg.innerHTML=`
    <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="var(--leaf)" stop-opacity="0.28"/>
      <stop offset="1" stop-color="var(--leaf)" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#wg)"/>
    <path d="${path}" fill="none" stroke="var(--leaf)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}`;
  const diff=vals[vals.length-1]-vals[0];
  $("#wStart").textContent=vals[0]+" kg → "+vals[vals.length-1]+" kg";
  $("#wTrend").textContent=(diff<=0?"已減 "+Math.abs(diff).toFixed(1):"增加 "+diff.toFixed(1))+" kg";
  $("#wTrend").style.color=diff<=0?"var(--leaf)":"var(--warm)";
}

const esc=s=>s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// 啟動：先讀回已儲存的資料
load();
render();
// 只有第一次（還沒設定過目標）才跳出設定面板
if(!state.profile){
  setTimeout(()=>openSheet("#setupSheet"),350);
}
</script>
